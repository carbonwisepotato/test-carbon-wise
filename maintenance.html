<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemeliharaan | CarbonWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .status-dot {
            animation: blink 1.5s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .leaf-float {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 text-slate-800 font-sans">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl text-center border border-slate-100">
        <div class="leaf-float text-6xl mb-6">🍃</div>

        <h1 class="text-3xl font-black mb-3">Sistem Sedang <br> Pemeliharaan</h1>
        <p class="text-slate-500 mb-8">CarbonWise sedang ditingkatkan performanya agar lebih akurat. Kami akan segera kembali!</p>

        <div class="inline-flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full mb-8">
            <span class="status-dot h-3 w-3 rounded-full bg-emerald-500"></span>
            <span class="text-xs font-bold text-slate-600 tracking-widest uppercase">Maintenance Mode</span>
        </div>

       <div>
            <a href="index.html" class="inline-flex items-center justify-center w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-full shadow-lg shadow-emerald-500/30 transition-all duration-300 transform hover:scale-105 active:scale-95">
                <i class="fas fa-arrow-left mr-2"></i> Kembali ke Beranda
            </a>
        </div>
    </div>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
