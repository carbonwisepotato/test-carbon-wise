<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | CarbonWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: radial-gradient(circle at top right, #0f172a, #020617); }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes morph {
            0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            50% { border-radius: 60% 40% 30% 70% / 50% 60% 40% 60%; }
        }
        .blob { animation: morph 8s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white font-sans antialiased selection:bg-emerald-500/30">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="blob absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-emerald-500/10 blur-[120px]"></div>
        <div class="blob absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-blue-500/10 blur-[100px]"></div>
    </div>

    <main class="glass max-w-sm w-full p-10 rounded-[2.5rem] shadow-2xl text-center relative">
        <div class="relative mb-8">
            <div class="absolute inset-0 bg-emerald-500/20 blur-xl rounded-full"></div>
            <span class="text-6xl relative z-10">🍃</span>
        </div>

        <h1 class="text-4xl font-black mb-4 tracking-tight">Sistem <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-emerald-600">Maintenance</span></h1>
        
        <p class="text-slate-400 mb-8 leading-relaxed text-sm">
            Kami sedang melakukan penyempurnaan infrastruktur agar CarbonWise berjalan lebih cepat dan efisien.
        </p>

        <div class="flex items-center justify-center gap-3 mb-10">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
            </span>
            <span class="text-[10px] font-bold text-emerald-400 tracking-[0.2em] uppercase italic">In Progress</span>
        </div>

        <a href="index.html" class="group relative inline-flex items-center justify-center w-full bg-white text-slate-950 font-bold py-4 px-6 rounded-2xl transition-all duration-300 hover:scale-[1.02] active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
            <i class="fas fa-home mr-2 transition-transform group-hover:-translate-x-1"></i>
            Kembali ke Beranda
        </a>
    </main>
    
</body>
</html>
